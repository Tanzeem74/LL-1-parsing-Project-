    <section class="bg-gray-50 p-6 min-h-screen">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-bold mb-6 text-center text-blue-700">LL(1) Parser</h1>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- Input-->
                <div class="bg-white p-5 rounded-lg shadow-md border border-gray-200">
                    <h2 class="font-bold mb-4 text-blue-600 border-b pb-2">1. Input Configuration</h2>
                    <label class="text-xs font-bold text-gray-500 uppercase">Grammar Rules</label>
                    <textarea id="grammar" class="w-full p-2 border rounded font-mono text-sm mt-1 mb-4" rows="10">E -> T E'
E' -> + T E' | ε
T -> F T'
T' -> * F T' | ε
F -> ( E ) | id</textarea>

                    <label class="text-xs font-bold text-gray-500 uppercase">String to Parse</label>
                    <input id="inputString" type="text" class="w-full p-2 border rounded mt-1" value="id + id * id">

                    <button onclick="processParser()"
                        class="w-full mt-6 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-bold shadow-lg shadow-blue-100">
                        Run Analysis
                    </button>
                </div>

                <!-- Output -->
                <div class="lg:col-span-3 space-y-6">
                    <div id="resultsArea" class="hidden space-y-6">
                        <!-- FIRST/FOLLOW -->
                        <div class="bg-white p-5 rounded-lg shadow-sm border">
                            <h2 class="font-bold mb-3 text-green-600">FIRST & FOLLOW Sets</h2>
                            <div id="setsTable"></div>
                        </div>

                        <!-- Parsing Table -->
                        <div class="bg-white p-5 rounded-lg shadow-sm border overflow-x-auto">
                            <h2 class="font-bold mb-3 text-purple-600">LL(1) Parsing Table</h2>
                            <div id="parsingTable"></div>
                        </div>

                        <!-- Stack Trace -->
                        <div class="bg-white p-5 rounded-lg shadow-sm border overflow-x-auto">
                            <h2 class="font-bold mb-3 text-orange-600">Stack Simulation</h2>
                            <div id="stackTrace"></div>
                        </div>
                    </div>

                    <div id="statusBox" class="hidden p-4 rounded-lg text-center font-bold"></div>
                </div>
            </div>
        </div>

        <script>
            function processParser() {
                document.getElementById('resultsArea').classList.remove('hidden');
                const raw = document.getElementById('grammar').value.trim();
                const inputStr = document.getElementById('inputString').value.trim().split(/\s+/).filter(x => x).concat('$');

                const rules = raw.split('\n').map(r => r.split('->').map(s => s.trim()));
                let grammar = {};
                let nonTerminals = new Set();
                let terminals = new Set();

                rules.forEach(([lhs, rhs]) => {
                    nonTerminals.add(lhs);
                    if (!grammar[lhs]) grammar[lhs] = [];
                    rhs.split('|').map(s => s.trim()).forEach(prod => {
                        let symbols = prod.split(/\s+/).filter(x => x);
                        grammar[lhs].push(symbols);
                        symbols.forEach(sym => {
                            if (sym !== 'ε' && !nonTerminals.has(sym) && !sym.match(/^[A-Z][']?$/)) terminals.add(sym);
                        });
                    });
                });
                terminals.add('$');

                // --- FIRST Calculation ---
                let first = {};
                nonTerminals.forEach(nt => first[nt] = new Set());
                let changed = true;
                while (changed) {
                    changed = false;
                    nonTerminals.forEach(nt => {
                        grammar[nt].forEach(prod => {
                            let before = first[nt].size;
                            if (prod[0] === 'ε') first[nt].add('ε');
                            else {
                                let i = 0;
                                while (i < prod.length) {
                                    let sym = prod[i];
                                    if (!nonTerminals.has(sym)) { first[nt].add(sym); break; }
                                    else {
                                        first[sym].forEach(f => { if (f !== 'ε') first[nt].add(f); });
                                        if (!first[sym].has('ε')) break;
                                    }
                                    i++;
                                    if (i === prod.length) first[nt].add('ε');
                                }
                            }
                            if (first[nt].size > before) changed = true;
                        });
                    });
                }

                // --- FOLLOW Calculation ---
                let follow = {};
                nonTerminals.forEach(nt => follow[nt] = new Set());
                follow[rules[0][0]].add('$');
                changed = true;
                while (changed) {
                    changed = false;
                    nonTerminals.forEach(A => {
                        grammar[A].forEach(prod => {
                            for (let i = 0; i < prod.length; i++) {
                                let B = prod[i];
                                if (nonTerminals.has(B)) {
                                    let before = follow[B].size;
                                    let rest = prod.slice(i + 1);
                                    if (rest.length === 0) follow[A].forEach(f => follow[B].add(f));
                                    else {
                                        let fRest = getFirstOfStr(rest, first, nonTerminals);
                                        fRest.forEach(f => { if (f !== 'ε') follow[B].add(f); });
                                        if (fRest.has('ε')) follow[A].forEach(f => follow[B].add(f));
                                    }
                                    if (follow[B].size > before) changed = true;
                                }
                            }
                        });
                    });
                }

                // Parsing Table Construction
                let table = {};
                nonTerminals.forEach(nt => { table[nt] = {}; });
                nonTerminals.forEach(A => {
                    grammar[A].forEach(prod => {
                        let firstProd = getFirstOfStr(prod, first, nonTerminals);
                        firstProd.forEach(a => {
                            if (a !== 'ε') table[A][a] = prod.join(' ');
                        });
                        if (firstProd.has('ε')) {
                            follow[A].forEach(b => { table[A][b] = prod.join(' '); });
                        }
                    });
                });

                renderSets(nonTerminals, first, follow);
                renderTable(nonTerminals, terminals, table);
                simulateStack(rules[0][0], inputStr, table, nonTerminals);
            }

            function getFirstOfStr(symbols, firstSets, nts) {
                let res = new Set();
                for (let s of symbols) {
                    if (!nts.has(s)) { res.add(s); return res; }
                    firstSets[s].forEach(f => res.add(f));
                    if (!firstSets[s].has('ε')) { res.delete('ε'); return res; }
                }
                return res;
            }

            function renderSets(nts, first, follow) {
                let html = `<table class="w-full border text-sm text-left">
                <tr class="bg-gray-50 border-b"><th class="p-2">NT</th><th class="p-2">FIRST</th><th class="p-2">FOLLOW</th></tr>`;
                nts.forEach(nt => {
                    html += `<tr class="border-b"><td class="p-2 font-bold text-blue-700">${nt}</td>
                <td class="p-2 font-mono text-gray-600">{ ${Array.from(first[nt]).join(', ')} }</td>
                <td class="p-2 font-mono text-gray-600">{ ${Array.from(follow[nt]).join(', ')} }</td></tr>`;
                });
                document.getElementById('setsTable').innerHTML = html + `</table>`;
            }

            function renderTable(nts, terminals, table) {
                let terms = Array.from(terminals).filter(t => t !== 'ε');
                let html = `<table class="w-full border text-xs text-center border-collapse">
                <tr class="bg-gray-100"><th class="border p-2">NT \\ T</th>`;
                terms.forEach(t => html += `<th class="border p-2">${t}</th>`);
                html += `</tr>`;
                nts.forEach(nt => {
                    html += `<tr><td class="border p-2 font-bold bg-gray-50">${nt}</td>`;
                    terms.forEach(t => {
                        let cell = table[nt][t] || "";
                        html += `<td class="border p-2 font-mono ${cell ? 'text-purple-600' : 'text-gray-300'}">${cell ? nt + ' -> ' + cell : '-'}</td>`;
                    });
                    html += `</tr>`;
                });
                document.getElementById('parsingTable').innerHTML = html + `</table>`;
            }

            function simulateStack(start, input, table, nts) {
                let stack = ['$', start];
                let steps = [];
                let i = 0;
                let success = true;

                while (stack.length > 0) {
                    let top = stack[stack.length - 1];
                    let curInput = input[i];
                    let step = { stack: [...stack].join(' '), input: input.slice(i).join(' '), action: "" };

                    if (top === curInput) {
                        stack.pop();
                        i++;
                        step.action = "Match " + top;
                    } else if (!nts.has(top)) {
                        step.action = "Error: Mismatch"; success = false; steps.push(step); break;
                    } else {
                        let prod = table[top][curInput];
                        if (prod) {
                            stack.pop();
                            if (prod !== 'ε') {
                                let symbols = prod.split(' ');
                                for (let j = symbols.length - 1; j >= 0; j--) stack.push(symbols[j]);
                            }
                            step.action = top + " -> " + prod;
                        } else {
                            step.action = "Error: No rule"; success = false; steps.push(step); break;
                        }
                    }
                    steps.push(step);
                    if (i >= input.length && stack.length === 0) break;
                }

                let html = `<table class="w-full border text-xs font-mono text-left">
                <tr class="bg-orange-50 border-b"><th class="p-2">Stack</th><th class="p-2">Input</th><th class="p-2">Action</th></tr>`;
                steps.forEach(s => {
                    html += `<tr class="border-b"><td class="p-2">${s.stack}</td><td class="p-2">${s.input}</td><td class="p-2 text-blue-600 italic">${s.action}</td></tr>`;
                });
                document.getElementById('stackTrace').innerHTML = html + `</table>`;

                const box = document.getElementById('statusBox');
                box.classList.remove('hidden', 'success', 'error');
                box.classList.add(success ? 'success' : 'error');
                box.innerText = success ? "✔ String Accepted!" : "✘ String Rejected!";
            }
        </script>
    </section>


</body>
